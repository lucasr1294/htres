name: Security Review

on:
  pull_request:
    branches: [main]

# Permisos mínimos necesarios para comentar en el PR
permissions:
  pull-requests: write
  contents: read

jobs:
  security:
    name: Análisis de seguridad con Claude
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2

      - name: Claude Code Security Review
        uses: anthropics/claude-code-security-review@main
        with:
          claude-api-key: ${{ secrets.CLAUDE_API_KEY }}
          comment-pr: true
          upload-results: true
          # No analizar en cada commit — solo cuando el PR cambia de forma significativa
          run-every-commit: false
          # Excluir carpetas que no son código de la app
          exclude-directories: node_modules,.next,prisma/migrations
